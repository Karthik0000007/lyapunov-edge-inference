name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.2.0 isort==5.13.2 mypy==1.8.0
          pip install types-PyYAML types-requests

      - name: Check formatting (black)
        run: black --check --diff src/ tests/ scripts/

      - name: Check import order (isort)
        run: isort --check-only --diff src/ tests/ scripts/

      - name: Type-check (mypy)
        run: mypy --ignore-missing-imports src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.2 --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy==1.26.4 pandas==2.2.0 pyarrow==15.0.0 \
                      gymnasium==0.29.1 scipy==1.12.0 pyyaml==6.0.1 \
                      pytest==8.0.2 pytest-cov==4.1.0 pytest-timeout==2.2.0 \
                      hypothesis==6.98.2 streamlit==1.30.0 plotly==5.18.0 \
                      opencv-python-headless==4.9.0.80

      - name: Create runtime directories
        run: |
          mkdir -p models/detection models/segmentation
          mkdir -p checkpoints/ppo_lyapunov checkpoints/conformal
          mkdir -p traces results/figures results/tables results/logs

      - name: Run tests
        run: pytest tests/ -v --timeout=60 --tb=short
